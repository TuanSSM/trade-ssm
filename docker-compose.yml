services:
  # === Live trading monitor (freqtrade: trade) ===
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-analyzer
    command: ["analyzer"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - INTERVAL=${INTERVAL:-15m}
      - CHECK_INTERVAL_SECS=${CHECK_INTERVAL_SECS:-60}
      - EXECUTION_MODE=${EXECUTION_MODE:-paper}

  # === Download historical data (freqtrade: download-data) ===
  download-data:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-download
    command: ["download-data"]
    profiles: ["tools"]
    volumes:
      - ./user_data:/app/user_data
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - INTERVAL=${INTERVAL:-15m}
      - DAYS=${DAYS:-30}
      - DATADIR=/app/user_data

  # === Run backtest on downloaded data (freqtrade: backtesting) ===
  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-backtest
    command: ["backtest"]
    profiles: ["tools"]
    volumes:
      - ./user_data:/app/user_data
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATAFILE=${DATAFILE:-}
      - CVD_WINDOW=${CVD_WINDOW:-15}

  # === RL trainer: train model from candle data ===
  rl-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-rl-trainer
    command: ["rl-trainer"]
    profiles: ["rl"]
    volumes:
      - ./models:/app/models
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - INTERVAL=${INTERVAL:-15m}
      - MODEL_DIR=/app/models
      - LEARNING_RATE=${LEARNING_RATE:-0.01}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-ssm}
      - NATS_PASS=${NATS_PASS:-ssm_nats_secret}
    depends_on:
      - nats
      - data-feed

  # === RL backtest: evaluate model on historical data ===
  rl-backtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-rl-backtest
    command: ["rl-backtest"]
    profiles: ["rl"]
    volumes:
      - ./user_data:/app/user_data
      - ./models:/app/models
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATAFILE=${DATAFILE:-}
      - RL_MODE=${RL_MODE:-single}
      - RL_TIMEFRAME=${RL_TIMEFRAME:-15m}
      - MODEL_PATH=${MODEL_PATH:-}

  # === Data feed: WebSocket -> NATS ===
  data-feed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-data-feed
    command: ["data-feed"]
    profiles: ["rl", "deploy"]
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - INTERVAL=${INTERVAL:-15m}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-ssm}
      - NATS_PASS=${NATS_PASS:-ssm_nats_secret}
    depends_on:
      - nats

  # === Signal service: strategy -> signals ===
  signal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-signal
    command: ["signal-service"]
    profiles: ["deploy"]
    volumes:
      - ./models:/app/models
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - INTERVAL=${INTERVAL:-15m}
      - STRATEGY_MODE=${STRATEGY_MODE:-cvd}
      - MODEL_PATH=${MODEL_PATH:-/app/models/table_model_best.json}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-ssm}
      - NATS_PASS=${NATS_PASS:-ssm_nats_secret}
    depends_on:
      - nats
      - data-feed

  # === Execution service: signals -> orders ===
  execution:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-execution
    command: ["execution-service"]
    profiles: ["deploy"]
    volumes:
      - store-data:/app/data
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SYMBOL=${SYMBOL:-BTCUSDT}
      - EXECUTION_MODE=${EXECUTION_MODE:-paper}
      - TRADE_QUANTITY=${TRADE_QUANTITY:-0.001}
      - STORE_PATH=/app/data/trade-ssm.db
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-ssm}
      - NATS_PASS=${NATS_PASS:-ssm_nats_secret}
    depends_on:
      - nats
      - signal

  # === API service: REST endpoints for monitoring ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-ssm-api
    command: ["api-service"]
    profiles: ["deploy"]
    ports:
      - "3000:3000"
    volumes:
      - store-data:/app/data
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - STORE_PATH=/app/data/trade-ssm.db
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_USER=${NATS_USER:-ssm}
      - NATS_PASS=${NATS_PASS:-ssm_nats_secret}
    depends_on:
      - nats
      - execution

  # === NATS message broker ===
  nats:
    image: nats:2-alpine
    container_name: trade-ssm-nats
    command: ["--user", "ssm", "--pass", "ssm_nats_secret"]
    profiles: ["rl", "deploy"]
    ports:
      - "4222:4222"

volumes:
  store-data:
