apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-feed
  namespace: trade-ssm
  labels:
    app.kubernetes.io/name: data-feed
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: trade-ssm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-feed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-feed
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: trade-ssm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: data-feed
          image: ghcr.io/tuanssm/trade-ssm:latest
          command: ["/app/data-feed"]
          envFrom:
            - configMapRef:
                name: trade-ssm-config
            - secretRef:
                name: trade-ssm-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
      restartPolicy: Always
