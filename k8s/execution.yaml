apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: execution-data
  namespace: trade-ssm
  labels:
    app.kubernetes.io/name: execution
    app.kubernetes.io/part-of: trade-ssm
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution
  namespace: trade-ssm
  labels:
    app.kubernetes.io/name: execution
    app.kubernetes.io/component: execution
    app.kubernetes.io/part-of: trade-ssm
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single writer for SQLite
  selector:
    matchLabels:
      app.kubernetes.io/name: execution
  template:
    metadata:
      labels:
        app.kubernetes.io/name: execution
        app.kubernetes.io/component: execution
        app.kubernetes.io/part-of: trade-ssm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: execution
          image: ghcr.io/tuanssm/trade-ssm:latest
          command: ["/app/execution-service"]
          envFrom:
            - configMapRef:
                name: trade-ssm-config
            - secretRef:
                name: trade-ssm-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: execution-data
      restartPolicy: Always
