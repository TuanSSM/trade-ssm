apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal
  namespace: trade-ssm
  labels:
    app.kubernetes.io/name: signal
    app.kubernetes.io/component: strategy
    app.kubernetes.io/part-of: trade-ssm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signal
        app.kubernetes.io/component: strategy
        app.kubernetes.io/part-of: trade-ssm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: signal
          image: ghcr.io/tuanssm/trade-ssm:latest
          command: ["/app/signal-service"]
          envFrom:
            - configMapRef:
                name: trade-ssm-config
            - secretRef:
                name: trade-ssm-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
      restartPolicy: Always
