apiVersion: v1
kind: ConfigMap
metadata:
  name: trade-ssm-config
  namespace: trade-ssm
  labels:
    app.kubernetes.io/part-of: trade-ssm
data:
  SYMBOL: "BTCUSDT"
  INTERVAL: "15m"
  NATS_URL: "nats://nats:4222"
  CHECK_INTERVAL_SECS: "60"
  EXECUTION_MODE: "paper"
  METRICS_PORT: "9090"
  LOG_FORMAT: "json"
  RUST_LOG: "info"
