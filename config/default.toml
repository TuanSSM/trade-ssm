# trade-ssm default configuration
# Override by setting CONFIG_FILE env var to point to your custom config.

[trading]
symbol = "BTCUSDT"
interval = "15m"
execution_mode = "paper"
quantity = "0.001"

[risk]
max_drawdown_pct = 10.0
max_open_positions = 3
position_size_pct = 2.0
# Position sizing mode: "fixed" or "kelly"
# sizing_mode = "fixed"
# Kelly criterion settings (used when sizing_mode = "kelly"):
# kelly_fraction_multiplier = 0.5   # 1.0=full, 0.5=half, 0.25=quarter Kelly
# kelly_min_trades = 30             # trades required before Kelly activates
# kelly_fallback_fraction = 0.02    # fixed fraction used below min_trades
# kelly_max_fraction = 0.25         # hard cap on Kelly fraction

[notifications]
enabled = false
# min_profit_threshold = "50"
# quiet_hours_start = 22
# quiet_hours_end = 6
cooldown_secs = 60

[logging]
level = "info"
# format = "json"
