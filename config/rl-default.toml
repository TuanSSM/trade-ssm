[env]
fee_rate = 0.0004
slippage_rate = 0.0001
initial_balance = 10000.0
position_size_pct = 1.0

[reward]
hold_penalty_threshold = 20
hold_penalty_rate = 0.001
invalid_action_penalty = 0.01
close_penalty_threshold = 50
close_penalty_rate = 0.001
fee_penalty = true
win_bonus = 0.0
drawdown_penalty_rate = 0.0

timeframes = ["3m", "15m", "1h", "4h"]

# Correlated pair symbols whose candle data enriches the RL feature vector.
# Each pair adds 22 features (full indicator set) to the observation space.
# Example: when trading LINKUSDT, include ETH and BTC as correlated context.
# correlation_pairs = ["ETHUSDT", "BTCUSDT"]
correlation_pairs = []

[optimize]
enabled = false
objective = "SharpeRatio"
method = "random"
n_trials = 100
seed = 42
