name: CI

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      cvd_window:
        description: "CVD analysis window size"
        default: "15"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --no-fail-fast
        env:
          RUST_LOG: debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: target/nextest/
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-release
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --bin analyzer --bin download-data --bin backtest --bin rl-backtest

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: trade-ssm-binaries-${{ github.sha }}
          path: |
            target/release/analyzer
            target/release/download-data
            target/release/backtest
            target/release/rl-backtest
          retention-days: 14

  backtest:
    name: Backtest
    runs-on: ubuntu-latest
    needs: build
    env:
      CVD_WINDOW: ${{ inputs.cvd_window || '15' }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: trade-ssm-binaries-${{ github.sha }}
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Run backtest
        run: |
          DATAFILE=test_data/BTCUSDT-15m-test.json \
          CVD_WINDOW=${{ env.CVD_WINDOW }} \
            ./bin/backtest

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.sha }}
          path: test_data/*.backtest.json
          retention-days: 30

  rl-backtest:
    name: RL Backtest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: trade-ssm-binaries-${{ github.sha }}
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Run RL backtest (single)
        run: |
          DATAFILE=test_data/BTCUSDT-15m-test.json \
          RL_TIMEFRAME=15m \
          RL_MODE=single \
            ./bin/rl-backtest

      - name: Upload RL backtest results
        uses: actions/upload-artifact@v4
        with:
          name: rl-backtest-${{ github.sha }}
          path: test_data/*.rl-backtest.json
          retention-days: 30

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [check, test, build, backtest, rl-backtest]
    if: always() && github.ref == 'refs/heads/main' && vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true'
    steps:
      - name: Set status
        id: status
        run: |
          if [ "${{ needs.check.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ] && \
             [ "${{ needs.backtest.result }}" = "success" ] && \
             [ "${{ needs.rl-backtest.result }}" = "success" ]; then
            echo "icon=✅" >> "$GITHUB_OUTPUT"
            echo "text=passed" >> "$GITHUB_OUTPUT"
          else
            echo "icon=❌" >> "$GITHUB_OUTPUT"
            echo "text=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ steps.status.outputs.icon }} <b>trade-ssm CI</b> ${{ steps.status.outputs.text }}
            <code>${{ github.ref_name }}</code> @ <code>${{ github.sha }}</code>

            Lint ${{ needs.check.result == 'success' && '✅' || '❌' }} Test ${{ needs.test.result == 'success' && '✅' || '❌' }} Build ${{ needs.build.result == 'success' && '✅' || '❌' }}
            Backtest ${{ needs.backtest.result == 'success' && '✅' || '❌' }} RL ${{ needs.rl-backtest.result == 'success' && '✅' || '❌' }}

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a> · <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts">Artifacts</a>
