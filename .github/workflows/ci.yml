name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check (all targets)
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace -- --nocapture
        env:
          RUST_LOG: debug

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --release --bin analyzer --bin download-data --bin backtest

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: trade-ssm-binaries
          path: |
            target/release/analyzer
            target/release/download-data
            target/release/backtest

  backtest:
    name: Backtest pipeline
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bin download-data --bin backtest

      - name: Download historical data (7 days)
        run: |
          SYMBOL=BTCUSDT INTERVAL=15m DAYS=7 DATADIR=user_data \
            cargo run --release --bin download-data
        env:
          RUST_LOG: info

      - name: List downloaded data
        run: ls -lh user_data/

      - name: Run backtest
        run: |
          DATAFILE=$(ls user_data/BTCUSDT-15m-*.json | head -1) \
            cargo run --release --bin backtest
        env:
          RUST_LOG: info

      - name: Show backtest results
        run: cat user_data/*.backtest.json

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: user_data/*.backtest.json
