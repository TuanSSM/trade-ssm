name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      symbol:
        description: "Trading pair symbol"
        default: "BTCUSDT"
        type: string
      interval:
        description: "Candle interval"
        default: "15m"
        type: string
      backtest_days:
        description: "Days of historical data for backtest"
        default: "7"
        type: string
      cvd_window:
        description: "CVD analysis window size"
        default: "15"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info
  # Parameterized — overridable via workflow_dispatch
  SYMBOL: ${{ inputs.symbol || 'BTCUSDT' }}
  INTERVAL: ${{ inputs.interval || '15m' }}
  BACKTEST_DAYS: ${{ inputs.backtest_days || '7' }}
  CVD_WINDOW: ${{ inputs.cvd_window || '15' }}

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check (all targets)
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace -- --nocapture
        env:
          RUST_LOG: debug

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --release --bin analyzer --bin download-data --bin backtest

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: trade-ssm-binaries
          path: |
            target/release/analyzer
            target/release/download-data
            target/release/backtest

  backtest:
    name: Backtest pipeline
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bin download-data --bin backtest

      - name: Download historical data
        run: |
          SYMBOL=${{ env.SYMBOL }} \
          INTERVAL=${{ env.INTERVAL }} \
          DAYS=${{ env.BACKTEST_DAYS }} \
          DATADIR=user_data \
            cargo run --release --bin download-data

      - name: List downloaded data
        run: ls -lh user_data/

      - name: Run backtest
        run: |
          DATAFILE=$(ls user_data/${{ env.SYMBOL }}-${{ env.INTERVAL }}-*.json | head -1) \
          CVD_WINDOW=${{ env.CVD_WINDOW }} \
            cargo run --release --bin backtest

      - name: Show backtest results
        run: cat user_data/*.backtest.json

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ env.SYMBOL }}-${{ env.INTERVAL }}
          path: user_data/*.backtest.json

  # === Deploy notification (requires secrets) ===
  notify:
    name: Notify on success
    runs-on: ubuntu-latest
    needs: [check, test, build, backtest]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Send Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="*trade-ssm CI passed* ✅%0ABranch: \`${{ github.ref_name }}\`%0ACommit: \`${{ github.sha }}\`"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
