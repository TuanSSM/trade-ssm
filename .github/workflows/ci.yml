name: CI

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      symbol:
        description: "Trading pair symbol"
        default: "BTCUSDT"
        type: string
      interval:
        description: "Candle interval"
        default: "15m"
        type: string
      backtest_days:
        description: "Days of historical data for backtest"
        default: "7"
        type: string
      cvd_window:
        description: "CVD analysis window size"
        default: "15"
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
          cache-on-failure: true

      - name: Run tests
        run: cargo test --workspace --no-fail-fast
        env:
          RUST_LOG: debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: target/nextest/
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-release
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --bin analyzer --bin download-data --bin backtest

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: trade-ssm-binaries-${{ github.sha }}
          path: |
            target/release/analyzer
            target/release/download-data
            target/release/backtest
          retention-days: 14

  backtest:
    name: Backtest
    runs-on: ubuntu-latest
    needs: build
    env:
      SYMBOL: ${{ inputs.symbol || 'BTCUSDT' }}
      INTERVAL: ${{ inputs.interval || '15m' }}
      BACKTEST_DAYS: ${{ inputs.backtest_days || '7' }}
      CVD_WINDOW: ${{ inputs.cvd_window || '15' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: trade-ssm-binaries-${{ github.sha }}
          path: bin

      - name: Make binaries executable
        run: chmod +x bin/*

      - name: Download historical data
        run: |
          SYMBOL=${{ env.SYMBOL }} \
          INTERVAL=${{ env.INTERVAL }} \
          DAYS=${{ env.BACKTEST_DAYS }} \
          DATADIR=user_data \
            ./bin/download-data

      - name: Run backtest
        run: |
          DATAFILE=$(ls user_data/${{ env.SYMBOL }}-${{ env.INTERVAL }}-*.json | head -1) \
          CVD_WINDOW=${{ env.CVD_WINDOW }} \
            ./bin/backtest

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ env.SYMBOL }}-${{ env.INTERVAL }}-${{ github.sha }}
          path: |
            user_data/*.backtest.json
            user_data/*.json
          retention-days: 30

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [check, test, build, backtest]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Telegram notification
        if: vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="*trade-ssm CI* ✅ \`${{ github.ref_name }}\` @ \`${GITHUB_SHA::7}\`"
