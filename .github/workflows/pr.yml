name: PR

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-check
          save-if: false

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-test
          save-if: false

      - name: Run tests
        run: cargo test --workspace --no-fail-fast 2>&1 | tee test-output.txt
        env:
          RUST_LOG: debug

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-test-output-${{ github.event.pull_request.number }}
          path: test-output.txt
          retention-days: 7

  # ── Security audit (non-blocking for PRs, advisory) ──
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Doc check ensures no broken doc links ──
  docs:
    name: Doc Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-docs
          save-if: false

      - name: Check docs build
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-build
          save-if: false

      - name: Build release
        run: cargo build --release --workspace

      - name: Verify key binaries
        run: |
          for bin in analyzer download-data backtest rl-backtest; do
            test -x "target/release/$bin" || { echo "::error::Binary $bin not found"; exit 1; }
            echo "✓ $bin ($(stat -c%s target/release/$bin | numfmt --to=iec))"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: |
            target/release/analyzer
            target/release/download-data
            target/release/backtest
            target/release/rl-backtest
          retention-days: 3

  # ── Post visible PR comment with test + build results ──
  pr-report:
    name: PR Report
    runs-on: ubuntu-latest
    needs: [check, test, build, audit, docs]
    if: always()
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Download test output
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: pr-test-output-${{ github.event.pull_request.number }}
          path: artifacts
        continue-on-error: true

      - name: Build PR comment
        run: |
          CHECK="${{ needs.check.result }}"
          TEST="${{ needs.test.result }}"
          BUILD="${{ needs.build.result }}"
          AUDIT="${{ needs.audit.result }}"
          DOCS="${{ needs.docs.result }}"

          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          {
            echo "## PR Check Results"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| Lint & Format | $(status_icon $CHECK) \`$CHECK\` | rustfmt + clippy |"
            echo "| Tests | $(status_icon $TEST) \`$TEST\` | cargo test --workspace |"
            echo "| Build | $(status_icon $BUILD) \`$BUILD\` | release binaries |"
            echo "| Security Audit | $(status_icon $AUDIT) \`$AUDIT\` | cargo audit (advisory) |"
            echo "| Doc Check | $(status_icon $DOCS) \`$DOCS\` | rustdoc -D warnings |"
            echo ""

            # Include test output summary if available
            if [ -f artifacts/test-output.txt ]; then
              # Extract test summary line
              SUMMARY=$(grep -E "^test result:" artifacts/test-output.txt | tail -1 || echo "")
              FAILED=$(grep -c "^test .* FAILED$" artifacts/test-output.txt 2>/dev/null || echo "0")

              echo "<details>"
              echo "<summary>Test Output Summary</summary>"
              echo ""

              if [ -n "$SUMMARY" ]; then
                echo '```'
                echo "$SUMMARY"
                echo '```'
              fi

              if [ "$FAILED" -gt 0 ]; then
                echo ""
                echo "**Failed tests:**"
                echo '```'
                grep "^test .* FAILED$" artifacts/test-output.txt || true
                echo '```'
              fi

              echo ""
              echo "</details>"
              echo ""
            fi

            echo "---"
            echo "*Commit: \`${{ github.event.pull_request.head.sha }}\` | Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > pr-comment.md

          cat pr-comment.md

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-checks
          path: pr-comment.md

  # ── Telegram notification for failed PR checks ──
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [check, test, build]
    if: always() && vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true' && (needs.check.result == 'failure' || needs.test.result == 'failure' || needs.build.result == 'failure')
    timeout-minutes: 5
    steps:
      - name: Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ❌ <b>PR #${{ github.event.pull_request.number }}</b> checks failed
            <a href="${{ github.event.pull_request.html_url }}">${{ github.event.pull_request.title }}</a>

            Lint ${{ needs.check.result == 'success' && '✅' || '❌' }} Test ${{ needs.test.result == 'success' && '✅' || '❌' }} Build ${{ needs.build.result == 'success' && '✅' || '❌' }}

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a> · <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts">Artifacts</a>

  summary:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [check, test, build, docs]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ]; then
            echo "::error::One or more checks failed"
            echo "  check: ${{ needs.check.result }}"
            echo "  test:  ${{ needs.test.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  docs:  ${{ needs.docs.result }}"
            exit 1
          fi
          echo "All PR checks passed"
