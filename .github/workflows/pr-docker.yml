name: PR Docker Integration

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  packages: read

concurrency:
  group: pr-docker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  DOCKER_BUILDKIT: 1

jobs:
  # ── Gate: only run Docker integration if code or Docker files changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.*.yml'
              - '.github/workflows/pr-docker.yml'
            rust:
              - 'crates/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Docker build test ──
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: trade-ssm:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=pr-docker
          cache-to: type=gha,mode=min,scope=pr-docker

      - name: Verify binaries in image
        id: verify
        run: |
          {
            echo "## Docker Image Verification"
            echo ""
            echo "**Image:** \`trade-ssm:pr-${{ github.event.pull_request.number }}\`"
            echo ""

            echo "### Binaries"
            echo '```'
            for bin in analyzer download-data backtest rl-backtest; do
              if docker run --rm trade-ssm:pr-${{ github.event.pull_request.number }} \
                  sh -c "test -x /usr/local/bin/$bin && echo '✓ $bin'" 2>/dev/null; then
                echo "  ✓ $bin found"
              else
                echo "  ✗ $bin MISSING"
                MISSING=1
              fi
            done
            echo '```'

            echo ""
            echo "### Image Size"
            echo '```'
            docker images trade-ssm:pr-${{ github.event.pull_request.number }} --format "{{.Size}}"
            echo '```'
          } | tee docker-build-report.txt

          if [ "${MISSING:-0}" = "1" ]; then
            echo "::error::Missing binaries in Docker image"
            exit 1
          fi

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-report-${{ github.event.pull_request.number }}
          path: docker-build-report.txt
          retention-days: 7

  # ── Docker-in-Docker integration tests ──
  docker-integration:
    name: DinD Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    services:
      dind:
        image: docker:27-dind
        options: --privileged
        ports:
          - 2375:2375
        env:
          DOCKER_TLS_CERTDIR: ""
    env:
      DOCKER_HOST: tcp://localhost:2375
    steps:
      - uses: actions/checkout@v6

      - name: Wait for DinD
        run: |
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "DinD ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::DinD failed to start after 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Build image in DinD
        run: docker build -t trade-ssm:integration .

      - name: Test — Container starts cleanly
        id: test-start
        run: |
          {
            echo "### Container Start Test"
            echo ""
            echo '```'
            # analyzer requires env vars — verify it exits gracefully without them
            docker run --rm -e RUST_LOG=error \
              trade-ssm:integration analyzer 2>&1 | head -20 || true
            echo '```'
            echo "Container executed (expected graceful exit without credentials)"
            echo ""
          } > integration-results.txt

      - name: Test — Binary verification
        id: test-binaries
        run: |
          {
            echo "### Binary Verification"
            echo ""
            echo '```'
          } >> integration-results.txt

          FAILED=0
          for bin in analyzer download-data backtest rl-backtest; do
            if docker run --rm trade-ssm:integration sh -c "test -x /usr/local/bin/$bin && echo '✓ $bin: executable'"; then
              docker run --rm trade-ssm:integration sh -c "test -x /usr/local/bin/$bin && echo '✓ $bin: executable'" >> integration-results.txt
            else
              echo "✗ $bin: missing or not executable" >> integration-results.txt
              FAILED=1
            fi
          done

          echo '```' >> integration-results.txt
          echo "" >> integration-results.txt

          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more binaries missing from Docker image"
            exit 1
          fi

      - name: Test — Docker Compose validation
        id: test-compose
        run: |
          {
            echo "### Docker Compose Validation"
            echo ""
            echo '```'
          } >> integration-results.txt

          # docker compose runs on the runner (host), not in DinD
          DOCKER_HOST="" docker compose config --quiet 2>&1 && \
            echo "✓ docker-compose.yml: valid" >> integration-results.txt || \
            echo "✗ docker-compose.yml: invalid" >> integration-results.txt

          echo '```' >> integration-results.txt
          echo "" >> integration-results.txt

      - name: Test — Container runtime checks
        id: test-runtime
        run: |
          {
            echo "### Runtime Environment"
            echo ""
            echo '```'
          } >> integration-results.txt

          # SSL certificates
          docker run --rm trade-ssm:integration \
            sh -c "test -d /etc/ssl/certs && echo '✓ SSL certificates present' || echo '✗ SSL certificates missing'" \
            >> integration-results.txt 2>&1

          # Working directory
          docker run --rm trade-ssm:integration \
            sh -c "test -d /app/user_data && echo '✓ /app/user_data directory exists' || echo '✗ /app/user_data missing'" \
            >> integration-results.txt 2>&1

          # DNS resolution (best-effort, may not work in all CI environments)
          docker run --rm trade-ssm:integration \
            sh -c "getent hosts api.binance.com >/dev/null 2>&1 && echo '✓ DNS resolution works' || echo '⚠ DNS not available (expected in some CI)'" \
            >> integration-results.txt 2>&1

          echo '```' >> integration-results.txt

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results-${{ github.event.pull_request.number }}
          path: integration-results.txt
          retention-days: 7

  # ── Post PR comment with results ──
  pr-comment:
    name: PR Report
    runs-on: ubuntu-latest
    needs: [docker-build, docker-integration]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.event.pull_request.number }}"
          merge-multiple: true

      - name: Build PR comment
        id: comment
        run: |
          BUILD_STATUS="${{ needs.docker-build.result }}"
          INTEGRATION_STATUS="${{ needs.docker-integration.result }}"

          # Status emoji mapping
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          {
            echo "## 🐳 Docker Integration Report"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Docker Build | $(status_icon $BUILD_STATUS) \`$BUILD_STATUS\` |"
            echo "| DinD Integration | $(status_icon $INTEGRATION_STATUS) \`$INTEGRATION_STATUS\` |"
            echo ""

            if [ -f docker-build-report.txt ]; then
              echo "<details>"
              echo "<summary>Docker Build Details</summary>"
              echo ""
              cat docker-build-report.txt
              echo ""
              echo "</details>"
              echo ""
            fi

            if [ -f integration-results.txt ]; then
              echo "<details>"
              echo "<summary>Integration Test Results</summary>"
              echo ""
              cat integration-results.txt
              echo ""
              echo "</details>"
              echo ""
            fi

            echo "---"
            echo "*Commit: \`${{ github.event.pull_request.head.sha }}\` | Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > pr-comment.md

          cat pr-comment.md

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docker-integration
          path: pr-comment.md

  # ── Telegram notification for Docker PR results ──
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [docker-build, docker-integration]
    if: always() && (needs.docker-build.result == 'failure' || needs.docker-integration.result == 'failure')
    steps:
      - name: Telegram notification
        if: vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BUILD="${{ needs.docker-build.result }}"
          INTEGRATION="${{ needs.docker-integration.result }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TEXT="*Docker PR #${PR_NUM}* ❌ Failed%0A"
          TEXT+="*PR:* [${PR_TITLE}](${PR_URL})%0A"
          TEXT+="Build: \`${BUILD}\` | Integration: \`${INTEGRATION}\`%0A"
          TEXT+="[View Run](${RUN_URL})"

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${TEXT}"

  # ── Final gate status ──
  docker-status:
    name: Docker PR Status
    runs-on: ubuntu-latest
    needs: [changes, docker-build, docker-integration]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          CHANGES_DOCKER="${{ needs.changes.outputs.docker }}"
          CHANGES_RUST="${{ needs.changes.outputs.rust }}"
          BUILD="${{ needs.docker-build.result }}"
          INTEGRATION="${{ needs.docker-integration.result }}"

          echo "Change detection — docker: $CHANGES_DOCKER, rust: $CHANGES_RUST"
          echo "Docker build: $BUILD"
          echo "Integration tests: $INTEGRATION"

          # If no relevant changes, skip is acceptable
          if [ "$CHANGES_DOCKER" != "true" ] && [ "$CHANGES_RUST" != "true" ]; then
            echo "No Docker/Rust changes detected — skipping"
            exit 0
          fi

          if [ "$BUILD" != "success" ]; then
            echo "::error::Docker build failed"
            exit 1
          fi

          if [ "$INTEGRATION" != "success" ]; then
            echo "::error::Docker integration tests failed"
            exit 1
          fi

          echo "All Docker PR checks passed"
