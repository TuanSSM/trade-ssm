name: PR Docker Integration

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  packages: read

concurrency:
  group: pr-docker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  DOCKER_BUILDKIT: 1

jobs:
  # ── Gate: only run Docker integration if code or Docker files changed ──
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.filter.outputs.docker == 'true' || steps.filter.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.*.yml'
              - '.github/workflows/pr-docker.yml'
            rust:
              - 'crates/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Docker build + integration tests (single job, no DinD overhead) ──
  docker-test:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: trade-ssm:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=pr-docker
          cache-to: type=gha,mode=min,scope=pr-docker

      - name: Verify binaries in image
        id: verify-binaries
        run: |
          IMAGE="trade-ssm:pr-${{ github.event.pull_request.number }}"
          FAILED=0

          {
            echo "## Docker Build Report"
            echo ""
            echo "**Image:** \`$IMAGE\`"
            echo ""
            echo "### Binary Verification"
            echo '```'
          } > report.txt

          for bin in analyzer download-data backtest rl-backtest; do
            if docker run --rm "$IMAGE" test -x "/usr/local/bin/$bin"; then
              echo "  ✓ $bin" >> report.txt
            else
              echo "  ✗ $bin MISSING" >> report.txt
              FAILED=1
            fi
          done

          echo '```' >> report.txt
          echo "" >> report.txt

          if [ "$FAILED" = "1" ]; then
            echo "::error::Missing binaries in Docker image"
            exit 1
          fi

      - name: Report image size
        id: image-size
        run: |
          IMAGE="trade-ssm:pr-${{ github.event.pull_request.number }}"
          SIZE=$(docker images "$IMAGE" --format "{{.Size}}")
          SIZE_BYTES=$(docker inspect "$IMAGE" --format '{{.Size}}')

          {
            echo "### Image Size"
            echo '```'
            echo "$SIZE"
            echo '```'
            echo ""
          } >> report.txt

          # Warn if image exceeds 200MB
          if [ "$SIZE_BYTES" -gt 209715200 ] 2>/dev/null; then
            echo "::warning::Docker image size ($SIZE) exceeds 200MB threshold"
            echo "> ⚠️ Image size ($SIZE) exceeds 200MB recommended threshold" >> report.txt
            echo "" >> report.txt
          fi

      - name: Test — Container starts cleanly
        id: test-start
        run: |
          IMAGE="trade-ssm:pr-${{ github.event.pull_request.number }}"

          {
            echo "### Container Start Test"
            echo '```'
          } >> report.txt

          # analyzer requires Telegram env vars — pass dummy values for smoke test
          # It will fail on network (no real Telegram API) but proves the binary starts
          timeout 10 docker run --rm \
            -e RUST_LOG=error \
            -e TELEGRAM_BOT_TOKEN=ci-test-dummy \
            -e TELEGRAM_CHAT_ID=0 \
            "$IMAGE" analyzer 2>&1 | head -20 >> report.txt || true

          {
            echo '```'
            echo "Container executed (expected graceful exit without live credentials)"
            echo ""
          } >> report.txt

      - name: Test — Docker Compose validation
        id: test-compose
        run: |
          {
            echo "### Docker Compose Validation"
            echo '```'
          } >> report.txt

          if docker compose config --quiet 2>&1; then
            echo "✓ docker-compose.yml: valid" >> report.txt
          else
            echo "✗ docker-compose.yml: invalid" >> report.txt
          fi

          echo '```' >> report.txt
          echo "" >> report.txt

      - name: Test — Runtime environment
        id: test-runtime
        run: |
          IMAGE="trade-ssm:pr-${{ github.event.pull_request.number }}"

          {
            echo "### Runtime Environment"
            echo '```'
          } >> report.txt

          # SSL certificates
          docker run --rm "$IMAGE" \
            sh -c "test -d /etc/ssl/certs && echo '✓ SSL certificates present' || echo '✗ SSL certificates missing'" \
            >> report.txt 2>&1

          # Working directory
          docker run --rm "$IMAGE" \
            sh -c "test -d /app/user_data && echo '✓ /app/user_data directory exists' || echo '✗ /app/user_data missing'" \
            >> report.txt 2>&1

          # Non-root user check (best practice)
          docker run --rm "$IMAGE" \
            sh -c "id -u" > /tmp/uid 2>&1
          UID_VAL=$(cat /tmp/uid)
          if [ "$UID_VAL" = "0" ]; then
            echo "⚠ Running as root (consider non-root user)" >> report.txt
          else
            echo "✓ Running as non-root (UID: $UID_VAL)" >> report.txt
          fi

          echo '```' >> report.txt

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-report-${{ github.event.pull_request.number }}
          path: report.txt
          retention-days: 7

      - name: Set outputs
        if: always()
        id: results
        run: |
          cat report.txt
          echo "report_exists=true" >> "$GITHUB_OUTPUT"

  # ── Post PR comment with results ──
  pr-comment:
    name: PR Report
    runs-on: ubuntu-latest
    needs: [changes, docker-test]
    if: always() && needs.changes.outputs.should_run == 'true'
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: docker-report-${{ github.event.pull_request.number }}
        continue-on-error: true

      - name: Build PR comment
        run: |
          TEST_STATUS="${{ needs.docker-test.result }}"

          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          {
            echo "## Docker Integration Report"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Docker Build & Test | $(status_icon $TEST_STATUS) \`$TEST_STATUS\` |"
            echo ""

            if [ -f report.txt ]; then
              echo "<details>"
              echo "<summary>Build & Integration Details</summary>"
              echo ""
              cat report.txt
              echo ""
              echo "</details>"
              echo ""
            fi

            echo "---"
            echo "*Commit: \`${{ github.event.pull_request.head.sha }}\` | Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } > pr-comment.md

          cat pr-comment.md

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docker-integration
          path: pr-comment.md

  # ── Telegram notification for Docker PR failures ──
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [docker-test]
    if: always() && vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true' && needs.docker-test.result == 'failure'
    timeout-minutes: 5
    steps:
      - name: Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ❌ <b>Docker PR #${{ github.event.pull_request.number }}</b> failed
            <a href="${{ github.event.pull_request.html_url }}">${{ github.event.pull_request.title }}</a>

            Build & Test ${{ needs.docker-test.result == 'success' && '✅' || '❌' }}

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a> · <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts">Artifacts</a>

  # ── Final gate status ──
  docker-status:
    name: Docker PR Status
    runs-on: ubuntu-latest
    needs: [changes, docker-test]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Evaluate results
        run: |
          SHOULD_RUN="${{ needs.changes.outputs.should_run }}"
          TEST="${{ needs.docker-test.result }}"

          echo "Should run: $SHOULD_RUN"
          echo "Docker test: $TEST"

          # If no relevant changes, skip is acceptable
          if [ "$SHOULD_RUN" != "true" ]; then
            echo "No Docker/Rust changes detected — skipping"
            exit 0
          fi

          if [ "$TEST" != "success" ]; then
            echo "::error::Docker build or integration tests failed"
            exit 1
          fi

          echo "All Docker PR checks passed"
